datasets:
  - dataset_id: trades_v1
    fields:
      - name: date
        type: date
        is_dimension: true
      - name: symbol
        type: string
        is_dimension: true
      - name: volume
        type: int64
        is_measure: true

  - dataset_id: trades_unavailable_v1
    # Intentionally schema-only so live Playwright can assert a real 409 DATASET_UNAVAILABLE query path.
    seed_sample_data: false
    fields:
      - name: date
        type: date
        is_dimension: true
      - name: symbol
        type: string
        is_dimension: true
      - name: volume
        type: int64
        is_measure: true
