<template id="queryUiTemplate">
  <div
    id=""
    class="queryUi"
    data-cellheadersaxis="columns"
  >
  </div>
</template>

<template id="queryUiAxis">
  <section>
    <header>
      <label><button id="-axis-primary-action" aria-label="Axis primary action"></button></label>
      <h1></h1>
    </header>
    <ol>
    </ol>
    <footer>
      <label title="Remove all items from this axis"><button id="-clear-axis" aria-label="Clear axis">Clear axis</button></label>
    </footer>
  </section>
</template>

<template id="queryUiAxisItem">
  <li draggable="true">
    <label title="Move this item to the left">
      <button id="-move-left" aria-label="Move field left">Move this item to the left</button>
    </label>
    <span></span>
    <menu>
      <label title="Calculate totals for this level">
        <input id="-toggle-totals" type="checkbox" aria-label="Toggle totals for this level"/>
      </label>
      <label title="Move this item to the other axis">
        <button id="-move-to-other-axis" aria-label="Move field to the other axis">Move this item to the other axis</button>
      </label>
      <label title="Remove this item from the axis">
        <button id="-remove-from-axis" aria-label="Remove field from axis">Remove this item from the axis</button>
      </label>
    </menu>
    <label title="Move this item to the right">
      <button id="-move-right" aria-label="Move field right">Move this item to the right</button>
    </label>
  </li>
</template>

<template id="queryUiFilterAxisItemValue">
  <li role="menuitem">
    <label
      title="Use the checkbox to enable/disable this condition"
      for=""
    >
      <span></span>
      <input
        id=""
        type="checkbox"
      />
    </label>
    <label
      title="Remove this filter condition"
      for=""
    >
      <button aria-label="Remove filter condition"></button>
    </label>
  </li>
</template>

<template id="queryUiFilterAxisItem">
  <li draggable="true">
    <label title="Move this item to the left">
      <button id="-move-left" aria-label="Move field left">Move this item to the left</button>
    </label>
    <details>
      <summary>
        <span></span>
      </summary>
      <header title="Filter condition type"></header>
      <ol role="menu"></ol>
    </details>
    <menu>
      <label title="Click to open the filter dialog to edit the filter.">
        <button id="-edit-filter-condition" aria-label="Edit filter condition">Click to open the filter dialog to edit the filter.</button>
      </label>
      <label title="Remove this item from the axis">
        <button id="-remove-from-axis" aria-label="Remove field from axis">Remove this item from the axis</button>
      </label>
    </menu>
    <label title="Move this item to the right">
      <button id="-move-right" aria-label="Move field right">Move this item to the right</button>
    </label>
  </li>
</template>
