# When a draft PR is opened, mark it "Ready for review" so it can be merged.
# Remove or disable this workflow if you prefer to keep PRs as drafts until manually marked ready.
name: Auto-ready draft PRs

on:
  pull_request:
    types: [opened]

jobs:
  mark-ready:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == true
    steps:
      - name: Mark draft PR as ready for review
        run: |
          curl -sS -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "${{ github.api_url }}/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}" \
            -d '{"draft":false}'
