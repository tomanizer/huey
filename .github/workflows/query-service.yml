# QueryService: build, lint, unit tests
name: QueryService CI

on:
  push:
    branches: [dev, main]
    paths:
      - 'server/**'
      - '.github/workflows/query-service.yml'
      - '.ruff.toml'
      - 'src/**'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - 'playwright.config.js'
      - 'scripts/**'
  pull_request:
    branches: [dev, main]
    paths:
      - 'server/**'
      - '.github/workflows/query-service.yml'
      - '.ruff.toml'
      - 'src/**'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - 'playwright.config.js'
      - 'scripts/**'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Verify Python version requirement
        run: python -c "import sys; assert sys.version_info >= (3, 11), f'Python 3.11+ required, got {sys.version_info.major}.{sys.version_info.minor}'"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-query-service-${{ hashFiles('server/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-query-service-

      - name: Install dependencies
        run: pip install -r server/requirements.txt

      - name: Run unit tests with coverage
        run: |
          PYTHONPATH=. python -m pytest server/tests -v \
            --cov=server \
            --cov-config=server/pyproject.toml \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify Python version requirement
        run: python -c "import sys; assert sys.version_info >= (3, 11), f'Python 3.11+ required, got {sys.version_info.major}.{sys.version_info.minor}'"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check server/

  frontend-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify Node/npm version requirement
        run: node scripts/check-node-version.js

      - name: Install dependencies
        run: npm ci

      - name: Run frontend unit tests
        run: npm run test:unit

      - name: Run frontend coverage
        run: npm run test:coverage

      - name: Upload frontend coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: coverage/

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify Node/npm version requirement
        run: node scripts/check-node-version.js

      - name: Install dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint:js

  e2e:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_PROJECTS: chromium
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify Node/npm version requirement
        run: node scripts/check-node-version.js

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers for CI matrix
        run: npx playwright install --with-deps $PLAYWRIGHT_PROJECTS

      - name: Run Playwright UI tests
        run: npm run test:ui
