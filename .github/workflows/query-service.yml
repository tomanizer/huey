# QueryService: build, lint, unit tests
name: QueryService CI

on:
  push:
    branches: [dev, main]
    paths: ['server/**', 'src/**', 'tests/ui/**', 'package.json', 'package-lock.json', 'playwright.config.js', '.github/workflows/query-service.yml', '.ruff.toml']
  pull_request:
    branches: [dev, main]
    paths: ['server/**', 'src/**', 'tests/ui/**', 'package.json', 'package-lock.json', 'playwright.config.js', '.github/workflows/query-service.yml', '.ruff.toml']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-query-service-${{ hashFiles('server/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-query-service-

      - name: Install dependencies
        run: pip install -r server/requirements.txt

      - name: Run unit tests with coverage
        run: |
          PYTHONPATH=. python -m pytest server/tests -v \
            --cov=server \
            --cov-config=server/pyproject.toml \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check server/

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Run Playwright UI tests
        run: npm run test:ui
