# Example dataset definitions for QueryService.
# Override path via QUERYSERVICE_DATASETS_CONFIG_PATH.

datasets:
  - dataset_id: trades_v1
    fields:
      - name: date
        type: date
        is_dimension: true
      - name: symbol
        type: string
        is_dimension: true
      - name: volume
        type: int64
        is_measure: true

  - dataset_id: "v1.0/btc/blocks"
    fields:
      - name: date
        type: date
        is_dimension: true
      - name: number
        type: int64
        is_dimension: true
      - name: hash
        type: string
        is_dimension: true
      - name: previousblockhash
        type: string
        is_dimension: true
      - name: mediantime
        type: string
        is_dimension: true
      - name: timestamp
        type: string
        is_dimension: true
      - name: last_modified
        type: string
        is_dimension: true
      - name: version
        type: int64
        is_dimension: true
      - name: bits
        type: string
        is_dimension: true
      - name: difficulty
        type: float64
        is_measure: true
      - name: chainwork
        type: string
        is_dimension: true
      - name: nonce
        type: int64
      - name: size
        type: int64
        is_measure: true
      - name: stripped_size
        type: int64
        is_measure: true
      - name: weight
        type: int64
        is_measure: true
      - name: transaction_count
        type: int64
        is_measure: true
      - name: coinbase_param
        type: string
        is_dimension: true
      - name: merkle_root
        type: string
        is_dimension: true

  - dataset_id: "nyc_taxi_yellow"
    source:
      kind: parquet_scan
      uris:
        - "s3://nyc-tlc/trip data/yellow_tripdata_*.parquet"
      read_options:
        hive_partitioning: false
        union_by_name: true
    fields:
      - name: VendorID
        type: int64
        is_dimension: true
      - name: tpep_pickup_datetime
        type: string
        is_dimension: true
      - name: tpep_dropoff_datetime
        type: string
        is_dimension: true
      - name: passenger_count
        type: int64
        is_measure: true
      - name: trip_distance
        type: float64
        is_measure: true
      - name: RatecodeID
        type: int64
        is_dimension: true
      - name: payment_type
        type: int64
        is_dimension: true
      - name: PULocationID
        type: int64
        is_dimension: true
      - name: DOLocationID
        type: int64
        is_dimension: true
      - name: fare_amount
        type: float64
        is_measure: true
      - name: tip_amount
        type: float64
        is_measure: true
      - name: tolls_amount
        type: float64
        is_measure: true
      - name: congestion_surcharge
        type: float64
        is_measure: true
      - name: total_amount
        type: float64
        is_measure: true