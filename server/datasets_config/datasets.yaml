# Example dataset definitions for QueryService.
# Override path via QUERYSERVICE_DATASETS_CONFIG_PATH.

datasets:
  - dataset_id: trades_v1
    fields:
      - name: date
        type: date
        is_dimension: true
      - name: symbol
        type: string
        is_dimension: true
      - name: volume
        type: int64
        is_measure: true

  # Ethereum blocks (same public bucket as Bitcoin; no credentials):
  #   aws s3 ls s3://aws-public-blockchain/v1.0/eth/ --no-sign-request
  # Use dataset_id=eth_blocks in API calls (no slashes).
  - dataset_id: eth_blocks
    source:
      kind: parquet_scan
      uris:
        - "s3://aws-public-blockchain/v1.0/eth/blocks/"
      read_options:
        hive_partitioning: true
      time_filter:
        column: date
        type: date
    fields:
      - name: date
        type: date
        is_dimension: true
      - name: number
        type: int64
        is_dimension: true
      - name: hash
        type: string
        is_dimension: true
      - name: parent_hash
        type: string
        is_dimension: true
      - name: miner
        type: string
        is_dimension: true
      - name: difficulty
        type: float64
        is_measure: true
      - name: total_difficulty
        type: float64
        is_measure: true
      - name: size
        type: int64
        is_measure: true
      - name: gas_limit
        type: int64
        is_measure: true
      - name: gas_used
        type: int64
        is_measure: true
      - name: timestamp
        type: int64
        is_dimension: true
      - name: transaction_count
        type: int64
        is_measure: true
      - name: base_fee_per_gas
        type: int64
        is_measure: true

  - dataset_id: "v1.0/btc/blocks"
    fields:
      - name: date
        type: date
        is_dimension: true
      - name: number
        type: int64
        is_dimension: true
      - name: hash
        type: string
        is_dimension: true
      - name: previousblockhash
        type: string
        is_dimension: true
      - name: mediantime
        type: string
        is_dimension: true
      - name: timestamp
        type: string
        is_dimension: true
      - name: last_modified
        type: string
        is_dimension: true
      - name: version
        type: int64
        is_dimension: true
      - name: bits
        type: string
        is_dimension: true
      - name: difficulty
        type: float64
        is_measure: true
      - name: chainwork
        type: string
        is_dimension: true
      - name: nonce
        type: int64
      - name: size
        type: int64
        is_measure: true
      - name: stripped_size
        type: int64
        is_measure: true
      - name: weight
        type: int64
        is_measure: true
      - name: transaction_count
        type: int64
        is_measure: true
      - name: coinbase_param
        type: string
        is_dimension: true
      - name: merkle_root
        type: string
        is_dimension: true

  # OpenAlex: scholarly papers, authors, institutions. Public S3 (no credentials):
  #   aws s3 ls s3://openalex/ --no-sign-request
  # Data is JSON Lines (gzip), not Parquet; backend only supports Parquet, so queries
  # will fail until JSON source support is added. Listed here for discovery.
  - dataset_id: openalex
    source:
      kind: parquet_scan
      uris:
        - "s3://openalex/data/works/"
      read_options:
        hive_partitioning: false
    fields:
      - name: id
        type: string
        is_dimension: true
      - name: title
        type: string
        is_dimension: true
      - name: publication_year
        type: int64
        is_dimension: true
      - name: cited_by_count
        type: int64
        is_measure: true
      - name: type
        type: string
        is_dimension: true

  - dataset_id: "nyc_taxi_yellow"
    source:
      kind: parquet_scan
      uris:
        - "s3://nyc-tlc/trip data/yellow_tripdata_*.parquet"
      read_options:
        hive_partitioning: false
        union_by_name: true
    fields:
      - name: VendorID
        type: int64
        is_dimension: true
      - name: tpep_pickup_datetime
        type: string
        is_dimension: true
      - name: tpep_dropoff_datetime
        type: string
        is_dimension: true
      - name: passenger_count
        type: int64
        is_measure: true
      - name: trip_distance
        type: float64
        is_measure: true
      - name: RatecodeID
        type: int64
        is_dimension: true
      - name: payment_type
        type: int64
        is_dimension: true
      - name: PULocationID
        type: int64
        is_dimension: true
      - name: DOLocationID
        type: int64
        is_dimension: true
      - name: fare_amount
        type: float64
        is_measure: true
      - name: tip_amount
        type: float64
        is_measure: true
      - name: tolls_amount
        type: float64
        is_measure: true
      - name: congestion_surcharge
        type: float64
        is_measure: true
      - name: total_amount
        type: float64
        is_measure: true