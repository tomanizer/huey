services:
  huey-server:
    container_name: huey-server
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8002:8000"
    volumes:
      # Mount workspace config to a path that does not exist in the image so the app cannot read the baked-in file.
      - ./server/datasets_config/datasets.yaml:/data/datasets.yaml:ro
    environment:
      UVICORN_WORKERS: "1"
      QUERYSERVICE_CORS_ORIGINS: '["http://localhost:8765"]'
      QUERYSERVICE_SEED_SAMPLE_DATA: "true"
      QUERYSERVICE_EXECUTION_MODE: "sample_table"
      QUERYSERVICE_S3_BUCKET: "aws-public-blockchain"
      QUERYSERVICE_S3_REGION: "us-east-2"
      QUERYSERVICE_DATASETS_CONFIG_PATH: "/data/datasets.yaml"
    restart: unless-stopped
